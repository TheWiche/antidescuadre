name: Desplegar a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  construir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: antidescuadre/package-lock.json

      - name: Instalar dependencias de la app
        run: npm ci
        working-directory: antidescuadre

      - name: Construir la app (PWA) bajo /app/
        run: npm run build
        working-directory: antidescuadre
        env:
          BASE_URL: /antidescuadre/app/

      - name: Ensamblar sitio + app
        run: |
          mkdir -p _site/app
          cp -r sitio/. _site/
          cp -r antidescuadre/dist/. _site/app/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  desplegar:
    needs: construir
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
